[theme]
base = "dark"
primaryColor = "#00ff41"
backgroundColor = "#0a0e17"
secondaryBackgroundColor = "#0d1321"
textColor = "#e0e0e0"
font = "monospace"

[server]
headless = true
port = 8501
address = "0.0.0.0"
maxUploadSize = 500
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
