<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b1fa2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c27b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c62828;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e53935;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43a047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#fafbfc"/>

  <!-- Title -->
  <text x="600" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1a1a2e" text-anchor="middle">System Architecture</text>
  <text x="600" y="72" font-family="Arial, sans-serif" font-size="15" fill="#666" text-anchor="middle">Deepfake Detection Pipeline</text>

  <!-- ===== 1. INPUT ===== -->
  <rect x="40" y="110" width="180" height="140" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
  <text x="130" y="148" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle">🎥</text>
  <text x="130" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">INPUT</text>
  <line x1="70" y1="190" x2="190" y2="190" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="130" y="212" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Video (MP4)</text>
  <text x="130" y="230" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Image (JPG/PNG)</text>

  <!-- Arrow 1 -->
  <line x1="225" y1="180" x2="265" y2="180" stroke="#bbb" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- ===== 2. PREPROCESSING ===== -->
  <rect x="270" y="110" width="180" height="140" rx="12" fill="url(#grad2)" filter="url(#shadow)"/>
  <text x="360" y="148" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle">🔍</text>
  <text x="360" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">PREPROCESS</text>
  <line x1="300" y1="190" x2="420" y2="190" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="360" y="212" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Extract → Detect → Crop</text>
  <text x="360" y="230" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Resize to 299×299</text>

  <!-- Arrow 2 -->
  <line x1="455" y1="180" x2="495" y2="180" stroke="#bbb" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- ===== 3. MODEL ===== -->
  <rect x="500" y="110" width="180" height="140" rx="12" fill="url(#grad3)" filter="url(#shadow)"/>
  <text x="590" y="148" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle">🧠</text>
  <text x="590" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">MODEL</text>
  <line x1="530" y1="190" x2="650" y2="190" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="590" y="212" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">XceptionNet</text>
  <text x="590" y="230" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">EfficientNet-B0</text>

  <!-- Arrow 3 -->
  <line x1="685" y1="180" x2="725" y2="180" stroke="#bbb" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- ===== 4. AGGREGATION ===== -->
  <rect x="730" y="110" width="180" height="140" rx="12" fill="url(#grad4)" filter="url(#shadow)"/>
  <text x="820" y="148" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle">📊</text>
  <text x="820" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">AGGREGATE</text>
  <line x1="760" y1="190" x2="880" y2="190" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="820" y="212" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Mean / Majority Vote</text>
  <text x="820" y="230" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Confidence Weighted</text>

  <!-- Arrow 4 -->
  <line x1="915" y1="180" x2="955" y2="180" stroke="#bbb" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- ===== 5. OUTPUT ===== -->
  <rect x="960" y="110" width="180" height="140" rx="12" fill="url(#grad5)" filter="url(#shadow)"/>
  <text x="1050" y="148" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle">✅</text>
  <text x="1050" y="178" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">OUTPUT</text>
  <line x1="990" y1="190" x2="1110" y2="190" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="1050" y="212" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Prediction: Real / Fake</text>
  <text x="1050" y="230" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)" text-anchor="middle">Confidence: 0.0 – 1.0</text>

  <!-- Arrow Marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== TOOLS USED ===== -->
  <rect x="40" y="300" width="1100" height="130" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="328" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e" text-anchor="middle">TECHNOLOGY STACK</text>
  <line x1="100" y1="340" x2="1100" y2="340" stroke="#eee" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="70" y="355" width="130" height="28" rx="6" fill="#e3f2fd"/>
  <text x="135" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">PyTorch 2.0+</text>

  <rect x="220" y="355" width="100" height="28" rx="6" fill="#f3e5f5"/>
  <text x="270" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7b1fa2" text-anchor="middle">MTCNN</text>

  <rect x="340" y="355" width="100" height="28" rx="6" fill="#ffebee"/>
  <text x="390" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">OpenCV</text>

  <rect x="460" y="355" width="100" height="28" rx="6" fill="#e8f5e9"/>
  <text x="510" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">FastAPI</text>

  <rect x="580" y="355" width="120" height="28" rx="6" fill="#fff3e0"/>
  <text x="640" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100" text-anchor="middle">torchvision</text>

  <rect x="720" y="355" width="100" height="28" rx="6" fill="#e3f2fd"/>
  <text x="770" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">NumPy</text>

  <rect x="840" y="355" width="100" height="28" rx="6" fill="#f3e5f5"/>
  <text x="890" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7b1fa2" text-anchor="middle">OpenCV</text>

  <rect x="960" y="355" width="100" height="28" rx="6" fill="#ffebee"/>
  <text x="1010" y="374" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">pytest</text>

  <!-- Row 2 -->
  <rect x="120" y="395" width="110" height="28" rx="6" fill="#e8f5e9"/>
  <text x="175" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">matplotlib</text>

  <rect x="250" y="395" width="130" height="28" rx="6" fill="#fff3e0"/>
  <text x="315" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100" text-anchor="middle">scikit-learn</text>

  <rect x="400" y="395" width="100" height="28" rx="6" fill="#e3f2fd"/>
  <text x="450" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565c0" text-anchor="middle">GradCAM</text>

  <rect x="520" y="395" width="120" height="28" rx="6" fill="#f3e5f5"/>
  <text x="580" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7b1fa2" text-anchor="middle">YAML Config</text>

  <rect x="660" y="395" width="100" height="28" rx="6" fill="#ffebee"/>
  <text x="710" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c62828" text-anchor="middle">JSON API</text>

  <rect x="780" y="395" width="100" height="28" rx="6" fill="#e8f5e9"/>
  <text x="830" y="414" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2e7d32" text-anchor="middle">Docker</text>

  <!-- Footer -->
  <text x="600" y="475" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle">Deepfake Detection System — B.Tech Cyber Security Project, FUTA</text>

</svg>
