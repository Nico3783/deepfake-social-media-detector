version: '3.8'

services:
  # Main API Service
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: deepfake-detector-api
    ports:
      - "8000:8000"
    volumes:
      - ../outputs/models:/app/outputs/models
      - ../configs:/app/configs
    environment:
      - MODEL_PATH=/app/outputs/models
      - LOG_LEVEL=info
      - MAX_WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 2G
          cpus: '1'
    networks:
      - deepfake-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: deepfake-detector-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deepfake-network

  # Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: deepfake-detector-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - deepfake-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: deepfake-detector-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - deepfake-network
    profiles:
      - monitoring

volumes:
  prometheus-data:
  grafana-data:

networks:
  deepfake-network:
    driver: bridge
